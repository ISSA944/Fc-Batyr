<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel · FC Batyr</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
      .admin-page { background: var(--bg); color: var(--text-primary); }
      .admin-top { background: var(--card); border-bottom: 1px solid rgba(255,255,255,.1); padding: 20px 0; }
      .admin-top-inner { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
      .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
      .brand-logo { width: 40px; height: 40px; }
      .brand-text { display: flex; flex-direction: column; gap: 2px; }
      .brand-text strong { font-size: 14px; color: var(--gold); }
      .brand-text small { font-size: 11px; color: rgba(255,255,255,.5); }
      .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
      .admin-shell { padding: 40px 0; }
      .panel-card { background: var(--card); border: 1px solid rgba(255,255,255,.05); border-radius: 8px; padding: 30px; margin-bottom: 30px; }
      .admin-login-card { max-width: 500px; margin: 60px auto 0; }
      .admin-login-card h1 { font-size: 32px; margin: 20px 0; color: var(--text-primary); }
      .admin-form { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
      .field-floating { position: relative; }
      .field-floating input { width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.2); color: var(--text-primary); font-size: 14px; transition: border-color .2s; }
      .field-floating input:focus { outline: none; border-bottom-color: var(--gold); }
      .field-floating label { position: absolute; top: 12px; left: 0; font-size: 12px; color: rgba(255,255,255,.5); transition: all .2s; text-transform: uppercase; letter-spacing: 1px; }
      .field-floating input:placeholder-shown { padding-top: 20px; }
      .field-floating input:not(:placeholder-shown) ~ label,
      .field-floating input:focus ~ label { top: -20px; font-size: 11px; }
      .admin-tabs { display: flex; gap: 10px; margin-top: 20px; border-bottom: 1px solid rgba(255,255,255,.1); }
      .admin-tab { background: transparent; border: none; color: rgba(255,255,255,.5); padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: 600; letter-spacing: 1px; transition: all .2s; border-bottom: 2px solid transparent; }
      .admin-tab.is-active { color: var(--gold); border-bottom-color: var(--gold); }
      .admin-tab-panel { margin-top: 30px; }
      .admin-list { margin-top: 20px; }
      .admin-item { background: rgba(212,168,67,.05); border: 1px solid rgba(212,168,67,.1); border-radius: 6px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
      .admin-item-content { flex: 1; }
      .admin-item-title { font-weight: 600; color: var(--gold); }
      .admin-item-meta { font-size: 13px; color: rgba(255,255,255,.5); margin-top: 4px; }
      .btn { padding: 12px 24px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all .2s; }
      .btn-primary { background: var(--gold); color: #0a0a0a; }
      .btn-primary:hover { background: #e8c96a; }
      .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,.2); color: var(--text-primary); }
      .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
      .btn-danger { background: #ff4444; color: white; }
      .btn-danger:hover { background: #ff6666; }
      .btn-small { padding: 8px 16px; font-size: 12px; }
      .form-status { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; }
      .form-status.is-success { display: block; background: rgba(76,186,55,.1); color: #4cba37; border: 1px solid rgba(76,186,55,.2); }
      .form-status.is-error { display: block; background: rgba(255,68,68,.1); color: #ff4444; border: 1px solid rgba(255,68,68,.2); }
      h2 { font-size: 24px; margin: 10px 0 0 0; }
      h3 { font-size: 18px; margin: 0 0 20px 0; }
      .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin: 0; }
      .muted { color: rgba(255,255,255,.5); }
      .admin-actions { display: flex; gap: 10px; }
      label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
      input[type="text"],
      input[type="email"],
      input[type="password"],
      textarea,
      select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid rgba(255,255,255,.1); border-radius: 4px; color: var(--text-primary); font-family: inherit; }
      input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold); }
      textarea { resize: vertical; }
      @media (max-width: 768px) {
        .admin-top-inner { flex-direction: column; gap: 15px; }
        .admin-shell { padding: 20px 0; }
        .panel-card { padding: 20px; }
      }
    </style>
    <script defer src="app.js"></script>
</head>
<body class="admin-page">
    <header class="admin-top">
        <div class="admin-top-inner">
            <a class="brand" href="index.html">
                <img class="brand-logo" src="logo.png" alt="FCB" style="opacity: 0.8;">
                <span class="brand-text">
                    <strong>FC BATYR</strong>
                    <small>Admin Panel</small>
                </span>
            </a>
            <a class="btn btn-ghost btn-small" href="index.html">Back to Site</a>
        </div>
    </header>

    <main class="container admin-shell">
        <section class="panel-card admin-login-card" id="admin-login-block">
            <p class="eyebrow">System Access</p>
            <h1>Admin Login</h1>
            <p class="muted">Access restricted to club staff. Test password: <strong>batyr-2026</strong>.</p>
            <form id="admin-login-form" class="admin-form admin-form--auth">
                <div class="field-floating">
                    <input type="email" id="admin-email" required placeholder=" " autocomplete="email">
                    <label for="admin-email">Admin Email</label>
                </div>
                <div class="field-floating">
                    <input type="password" id="admin-password" required placeholder=" " autocomplete="current-password">
                    <label for="admin-password">Password</label>
                </div>
                <button class="btn btn-primary" type="submit">Login</button>
                <p class="form-status is-error" id="admin-login-error" role="alert"></p>
            </form>
        </section>

        <section id="admin-panel" hidden>
            <div class="panel-card">
                <div class="admin-top-inner">
                    <div>
                        <p class="eyebrow">Content Management</p>
                        <h2>FC Batyr Admin Dashboard</h2>
                    </div>
                    <button type="button" class="btn btn-ghost btn-small" id="admin-logout">Logout</button>
                </div>

                <div class="admin-tabs" role="tablist" aria-label="Admin Sections">
                    <button class="admin-tab is-active" type="button" data-tab-target="tab-club">Club</button>
                    <button class="admin-tab" type="button" data-tab-target="tab-coaches">Coaches</button>
                    <button class="admin-tab" type="button" data-tab-target="tab-trainings">Training</button>
                    <button class="admin-tab" type="button" data-tab-target="tab-messages">Applications</button>
                </div>
            </div>

            <section id="tab-club" class="admin-tab-panel panel-card">
                <h3>Website Content</h3>
                <form id="club-form" class="admin-form">
                    <label>
                        Hero Eyebrow
                        <input type="text" name="heroTag" required>
                    </label>
                    <label>
                        Hero Title
                        <input type="text" name="heroTitle" required>
                    </label>
                    <label>
                        Hero Subtitle
                        <textarea name="heroSubtitle" rows="3" required></textarea>
                    </label>
                    <label>
                        Club Description
                        <textarea name="clubDescription" rows="4" required></textarea>
                    </label>
                    <label>
                        Phone
                        <input type="text" name="phone" required>
                    </label>
                    <label>
                        Email
                        <input type="email" name="email" required>
                    </label>
                    <label>
                        Address
                        <input type="text" name="address" required>
                    </label>
                    <div class="admin-actions">
                        <button class="btn btn-primary" type="submit">Save Changes</button>
                        <button class="btn btn-danger" id="reset-defaults" type="button">Reset to Default</button>
                    </div>
                    <p class="form-status" id="admin-status-club"></p>
                </form>
            </section>

            <section id="tab-coaches" class="admin-tab-panel panel-card" hidden>
                <h3>Coaching Staff</h3>
                <form id="coach-form" class="admin-form">
                    <label>
                        Name
                        <input type="text" name="name" required>
                    </label>
                    <label>
                        Position
                        <input type="text" name="role" placeholder="Head Coach U14">
                    </label>
                    <label>
                        Experience
                        <input type="text" name="experience" placeholder="Experience: 9 years">
                    </label>
                    <label>
                        License
                        <input type="text" name="license" placeholder="License: UEFA C">
                    </label>
                    <label>
                        Specialization
                        <input type="text" name="focus" placeholder="Focus: Tactical Training">
                    </label>
                    <button class="btn btn-primary" type="submit">Add Coach</button>
                    <p class="form-status" id="admin-status-coach"></p>
                </form>
                <div class="admin-list" id="admin-coaches-list"></div>
            </section>

            <section id="tab-trainings" class="admin-tab-panel panel-card" hidden>
                <h3>Training Groups</h3>
                <form id="training-form" class="admin-form">
                    <label>
                        Group Name
                        <input type="text" name="title" required>
                    </label>
                    <label>
                        Age Range
                        <input type="text" name="age" placeholder="12-14 years">
                    </label>
                    <label>
                        Days
                        <input type="text" name="days" placeholder="Mon / Wed / Fri">
                    </label>
                    <label>
                        Time
                        <input type="text" name="time" placeholder="6:00 PM - 7:30 PM">
                    </label>
                    <label>
                        Location
                        <input type="text" name="location" placeholder="FC Batyr Sports Complex">
                    </label>
                    <label>
                        Notes
                        <input type="text" name="note" placeholder="Training focus or format">
                    </label>
                    <button class="btn btn-primary" type="submit">Add Training</button>
                    <p class="form-status" id="admin-status-training"></p>
                </form>
                <div class="admin-list" id="admin-trainings-list"></div>
            </section>

            <section id="tab-messages" class="admin-tab-panel panel-card" hidden>
                <div class="admin-top-inner">
                    <h3>Incoming Applications</h3>
                    <button class="btn btn-danger btn-small" id="clear-messages" type="button">Clear All</button>
                </div>
                <div class="admin-list" id="admin-messages-list"></div>
            </section>
        </section>
    </main>

    <div id="snackbar-root" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
